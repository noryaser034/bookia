name: bookia
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.4.0

dependencies:
  carousel_slider: ^5.1.2
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.3
  gap: ^3.0.1
  lottie: ^3.3.2
  pinput: ^5.0.0
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/image/
    - assets/icon/

  fonts:
    - family: DMserif
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
